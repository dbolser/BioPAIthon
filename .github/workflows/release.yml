name: Release

# Builds wheels and an sdist, then publishes to PyPI via Trusted Publishing.
#
# Triggered by pushing a version tag, e.g.:
#     git tag v1.88.0 && git push origin v1.88.0
#
# The PyPI Trusted Publisher for `biopaithon` must be configured with:
#     Owner: dbolser | Repository: BioPAIthon
#     Workflow name: release.yml | Environment name: pypi
#
# TODO(#improvements-3.1): pin these actions to commit SHAs rather than tags.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Runs first and gates everything else. The tag does not set the version -
  # pyproject.toml reads it from Bio.__version__ - so a mismatch would publish
  # the wrong version, and PyPI versions can never be reused.
  check_version:
    name: Tag matches Bio.__version__
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packaging
        run: python -m pip install --upgrade packaging

      - name: Compare tag against Bio.__version__
        run: python .github/check_version.py

  build_wheels:
    name: Wheels (${{ matrix.os }})
    needs: check_version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest      # x86_64 manylinux + musllinux
          - ubuntu-24.04-arm   # aarch64; drop this entry if the repo is private
          - macos-15           # arm64 host; also cross-builds x86_64, see pyproject
          - windows-latest     # AMD64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Deliberately unpinned so new CPython releases are picked up. Pin this
      # if you need byte-reproducible wheels.
      - name: Install cibuildwheel
        run: python -m pip install --upgrade cibuildwheel

      # Build settings live in [tool.cibuildwheel] in pyproject.toml, so a
      # local `cibuildwheel` run reproduces CI exactly.
      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  build_sdist:
    name: Source distribution
    needs: check_version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          python -m pip install --upgrade build
          python -m build --sdist

      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # Only publish from a tag, never from a manual dispatch on a branch.
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/biopaithon
    permissions:
      id-token: write   # required for Trusted Publishing; no API token needed
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List what will be uploaded
        run: ls -l dist

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
